<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Airline Tycoon Simulator</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ===== ГЛОБАЛЬНЫЕ СТИЛИ ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0b1a2f;
      color: #e0e8f0;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ===== ШАПКА ===== */
    header {
      background: #122b44;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #2a6f9c;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 24px;
      letter-spacing: 1px;
    }

    #game-info {
      display: flex;
      gap: 32px;
      font-size: 18px;
      font-weight: 500;
    }

    #game-info span {
      background: #1a3a55;
      padding: 4px 16px;
      border-radius: 20px;
      border: 1px solid #2a6f9c;
    }

    /* ===== ОСНОВНАЯ ЧАСТЬ ===== */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== БОКОВАЯ ПАНЕЛЬ ===== */
    #sidebar {
      width: 320px;
      background: #0f1f30;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-right: 2px solid #1a3a55;
      overflow-y: auto;
      flex-shrink: 0;
    }

    #sidebar .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    #sidebar button {
      background: #1d3b57;
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      flex: 1 0 auto;
      font-size: 14px;
    }

    #sidebar button:hover {
      background: #2a5a7a;
      transform: scale(1.02);
    }

    #sidebar button.active {
      background: #2a6f9c;
      box-shadow: 0 0 8px #2a6f9c;
    }

    #panel-content {
      flex: 1;
      margin-top: 12px;
      background: #122b44;
      border-radius: 8px;
      padding: 12px;
      overflow-y: auto;
      min-height: 200px;
    }

    #panel-content h3 {
      margin: 12px 0 8px 0;
      color: #8fcbff;
      border-bottom: 1px solid #2a6f9c;
      padding-bottom: 4px;
    }

    #panel-content .item {
      background: #1a3a55;
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #panel-content .item .label {
      font-weight: 300;
    }
    #panel-content .item .value {
      font-weight: 600;
      color: #ffd966;
    }

    /* ===== ФОРМА ДОБАВЛЕНИЯ МАРШРУТА ===== */
    .route-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .route-form select,
    .route-form input {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #2a6f9c;
      background: #0b1a2f;
      color: #e0e8f0;
      font-size: 14px;
    }

    .route-form button {
      background: #2a6f9c;
      border: none;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .route-form button:hover {
      background: #3a8fc9;
    }

    /* ===== КАРТА ===== */
    #map-container {
      flex: 1;
      background: #1a2f40;
      height: 100%;
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 768px) {
      #sidebar {
        width: 260px;
      }
      header h1 {
        font-size: 18px;
      }
      #game-info {
        font-size: 14px;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- ШАПКА -->
    <header>
      <h1>✈️ Airline Tycoon</h1>
      <div id="game-info">
        <span>💰 <span id="cash">10 000 000</span> $</span>
        <span>📅 День <span id="day">1</span></span>
        <span>✈️ <span id="fleet-count">0</span></span>
      </div>
    </header>

    <!-- ОСНОВНАЯ ЧАСТЬ -->
    <main>
      <!-- Боковая панель -->
      <aside id="sidebar">
        <div class="btn-group">
          <button data-view="fleet" class="active">🛩️ Флот</button>
          <button data-view="routes">🗺️ Маршруты</button>
          <button data-view="add-route">➕ Новый маршрут</button>
          <button data-view="market">📊 Рынок</button>
        </div>
        <div id="panel-content">
          <!-- Содержимое панели будет рендериться через JS -->
        </div>
      </aside>

      <!-- Карта -->
      <section id="map-container"></section>
    </main>
  </div>

  <!-- ===== ПОДКЛЮЧЕНИЕ LEAFLET ===== -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>

  <!-- ===== ОСНОВНОЙ СКРИПТ (ВСЯ ИГРА) ===== -->
  <script>
    // ------------------------------------------------------------
    // 1. ДАННЫЕ (аэропорты и самолёты)
    // ------------------------------------------------------------
    const AIRPORTS_DATA = [
      { id: "lhr", name: "Хитроу", city: "Лондон", country: "Великобритания", lat: 51.47, lng: -0.45,
        passengersPerYear: 80000000 },
      { id: "jfk", name: "Джон Кеннеди", city: "Нью-Йорк", country: "США", lat: 40.64, lng: -73.78,
        passengersPerYear: 62000000 },
      { id: "svo", name: "Шереметьево", city: "Москва", country: "Россия", lat: 55.97, lng: 37.41,
        passengersPerYear: 40000000 },
      { id: "dxb", name: "Дубай", city: "Дубай", country: "ОАЭ", lat: 25.25, lng: 55.36, passengersPerYear: 89000000 },
      { id: "cdg", name: "Шарль-де-Голль", city: "Париж", country: "Франция", lat: 49.01, lng: 2.55,
        passengersPerYear: 72000000 },
      { id: "fra", name: "Франкфурт", city: "Франкфурт", country: "Германия", lat: 50.03, lng: 8.57,
        passengersPerYear: 70000000 },
      { id: "ist", name: "Новый аэропорт Стамбула", city: "Стамбул", country: "Турция", lat: 41.26, lng: 28.74,
        passengersPerYear: 68000000 },
      { id: "sin", name: "Чанги", city: "Сингапур", country: "Сингапур", lat: 1.36, lng: 103.99, passengersPerYear: 68000000 }
    ];

    const AIRCRAFTS_DATA = [
      { id: "b737", model: "Boeing 737-800", capacity: 189, range: 5765, speed: 840, fuelBurn: 2.6, maintenanceCost: 1200,
        price: 9000000 },
      { id: "a320", model: "Airbus A320neo", capacity: 180, range: 6300, speed: 830, fuelBurn: 2.3, maintenanceCost: 1100,
        price: 10500000 },
      { id: "b787", model: "Boeing 787-9", capacity: 290, range: 14140, speed: 900, fuelBurn: 3.8, maintenanceCost: 2500,
        price: 28000000 },
      { id: "a380", model: "Airbus A380", capacity: 550, range: 14800, speed: 900, fuelBurn: 5.2, maintenanceCost: 4000,
        price: 45000000 }
    ];

    // ------------------------------------------------------------
    // 2. КЛАССЫ
    // ------------------------------------------------------------
    class Airport {
      constructor(data) {
        this.id = data.id;
        this.name = data.name;
        this.city = data.city;
        this.country = data.country;
        this.lat = data.lat;
        this.lng = data.lng;
        this.runways = data.runways || 1;
        this.passengersPerYear = data.passengersPerYear || 1000000;
      }
    }

    class Aircraft {
      constructor(data) {
        this.id = data.id;
        this.model = data.model;
        this.capacity = data.capacity;
        this.range = data.range;
        this.speed = data.speed;
        this.fuelBurn = data.fuelBurn;
        this.maintenanceCost = data.maintenanceCost || 500;
        this.price = data.price || 5000000;
      }
    }

    class Route {
      constructor(from, to, aircraft, price) {
        this.from = from;
        this.to = to;
        this.aircraft = aircraft;
        this.price = price;
        this.demand = Math.floor(Math.random() * 80 + 20); // 20-100
        this.loadFactor = 0.7 + Math.random() * 0.25; // 0.7-0.95
      }

      calculateRevenue() {
        const passengers = Math.floor(this.aircraft.capacity * this.loadFactor * this.demand / 100);
        return passengers * this.price;
      }

      // Обновляем загрузку и спрос динамически (вызывается каждый день)
      update() {
        // Небольшие случайные колебания
        this.demand = Math.min(100, Math.max(10, this.demand + (Math.random() - 0.5) * 10));
        this.loadFactor = Math.min(0.95, Math.max(0.5, this.loadFactor + (Math.random() - 0.5) * 0.06));
      }
    }

    class Airline {
      constructor(name) {
        this.name = name;
        this.fleet = []; // массив Aircraft (принадлежащих авиакомпании)
        this.employees = [];
        this.reputation = 50;
      }
    }

    // ------------------------------------------------------------
    // 3. ИГРОВОЙ КЛАСС GAME
    // ------------------------------------------------------------
    class Game {
      constructor() {
        this.day = 1;
        this.cash = 10000000;
        this.airline = new Airline('Мои авиалинии');

        // Инициализация аэропортов
        this.airports = AIRPORTS_DATA.map(a => new Airport(a));

        // Инициализация всех доступных самолётов (глобальный рынок)
        this.availableAircrafts = AIRCRAFTS_DATA.map(a => new Aircraft(a));

        // Флот авиакомпании (изначально пуст) — добавим несколько самолётов для старта
        this.airline.fleet.push(new Aircraft(AIRCRAFTS_DATA[0])); // Boeing 737
        this.airline.fleet.push(new Aircraft(AIRCRAFTS_DATA[1])); // A320

        // Маршруты
        this.routes = [];

        // Конкуренты (пока заглушка)
        this.competitors = [];

        // Карта (будет инициализирована позже)
        this.map = null;
        this.markers = [];
        this.routeLines = [];

        // Создаём стартовый маршрут для примера
        const from = this.airports.find(a => a.id === 'lhr');
        const to = this.airports.find(a => a.id === 'jfk');
        const ac = this.airline.fleet[0];
        if (from && to && ac) {
          this.addRoute(from.id, to.id, ac.id, 450);
        }
      }

      // Добавление маршрута по ID аэропортов и ID самолёта
      addRoute(fromId, toId, aircraftId, price) {
        const from = this.airports.find(a => a.id === fromId);
        const to = this.airports.find(a => a.id === toId);
        if (!from || !to) return false;

        // Ищем самолёт в флоте
        const ac = this.airline.fleet.find(a => a.id === aircraftId);
        if (!ac) return false;

        // Проверяем дальность
        const distance = this.calcDistance(from.lat, from.lng, to.lat, to.lng);
        if (distance > ac.range) {
          alert(`Дальность маршрута (${Math.round(distance)} км) превышает дальность самолёта (${ac.range} км)`);
          return false;
        }

        // Проверяем, не существует ли уже такой маршрут
        const exists = this.routes.some(r => r.from.id === fromId && r.to.id === toId && r.aircraft.id === aircraftId);
        if (exists) {
          alert('Такой маршрут уже существует');
          return false;
        }

        const route = new Route(from, to, ac, price);
        this.routes.push(route);
        this.updateMapRoutes();
        return true;
      }

      // Расчёт расстояния (гаверсинус) в км
      calcDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      // Переход на следующий день
      nextDay() {
        this.day++;

        // Доход от маршрутов
        let totalRevenue = 0;
        for (const route of this.routes) {
          route.update(); // обновляем спрос и загрузку
          const revenue = route.calculateRevenue();
          totalRevenue += revenue;
        }
        this.cash += totalRevenue;

        // Расходы на обслуживание самолётов в флоте
        let totalMaintenance = 0;
        for (const ac of this.airline.fleet) {
          totalMaintenance += ac.maintenanceCost;
        }
        this.cash -= totalMaintenance;

        // Расходы на маршруты (топливо и т.п.) - упрощённо
        const fuelCost = this.routes.length * 200;
        this.cash -= fuelCost;

        // Ограничение снизу (не уходим в минус, но показываем)
        if (this.cash < 0) this.cash = 0;

        // Обновляем UI
        updateUI(this);
        // Обновляем маршруты на карте (если нужно)
        this.updateMapRoutes();
      }

      // Обновление линий маршрутов на карте
      updateMapRoutes() {
        if (!this.map) return;
        // Удаляем старые линии
        for (const line of this.routeLines) {
          this.map.removeLayer(line);
        }
        this.routeLines = [];

        for (const route of this.routes) {
          const latlngs = [
            [route.from.lat, route.from.lng],
            [route.to.lat, route.to.lng]
          ];
          const line = L.polyline(latlngs, { color: '#ffd966', weight: 3, opacity: 0.7 });
          line.addTo(this.map);
          this.routeLines.push(line);
        }
      }

      // Покупка нового самолёта
      buyAircraft(aircraftId) {
        const acData = AIRCRAFTS_DATA.find(a => a.id === aircraftId);
        if (!acData) return false;
        if (this.cash < acData.price) {
          alert('Недостаточно средств!');
          return false;
        }
        this.cash -= acData.price;
        const newAc = new Aircraft(acData);
        this.airline.fleet.push(newAc);
        updateUI(this);
        return true;
      }
    }

    // ------------------------------------------------------------
    // 4. ИНИЦИАЛИЗАЦИЯ КАРТЫ
    // ------------------------------------------------------------
    function initMap(containerId) {
      const map = L.map(containerId).setView([30, 10], 2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      return map;
    }

    // ------------------------------------------------------------
    // 5. UI / ОТРИСОВКА
    // ------------------------------------------------------------
    function updateUI(game) {
      // Шапка
      document.getElementById('cash').textContent = Math.round(game.cash).toLocaleString();
      document.getElementById('day').textContent = game.day;
      document.getElementById('fleet-count').textContent = game.airline.fleet.length;

      // Панель – отображаем текущий активный вид
      const activeView = document.querySelector('[data-view].active');
      if (activeView) {
        const view = activeView.dataset.view;
        renderPanel(game, view);
      } else {
        renderPanel(game, 'fleet');
      }
    }

    function renderPanel(game, view) {
      const panel = document.getElementById('panel-content');
      panel.innerHTML = '';

      switch (view) {
        case 'fleet':
          renderFleet(game, panel);
          break;
        case 'routes':
          renderRoutes(game, panel);
          break;
        case 'add-route':
          renderAddRouteForm(game, panel);
          break;
        case 'market':
          renderMarket(game, panel);
          break;
        default:
          panel.innerHTML = '<p>Выберите раздел</p>';
      }
    }

    function renderFleet(game, panel) {
      let html = '<h3>🛩️ Ваш флот</h3>';
      if (game.airline.fleet.length === 0) {
        html += '<p>У вас пока нет самолётов. Купите на рынке.</p>';
      } else {
        for (const ac of game.airline.fleet) {
          html += `
            <div class="item">
              <span class="label">${ac.model}</span>
              <span class="value">${ac.capacity} мест</span>
            </div>
          `;
        }
      }
      panel.innerHTML = html;
    }

    function renderRoutes(game, panel) {
      let html = '<h3>🗺️ Ваши маршруты</h3>';
      if (game.routes.length === 0) {
        html += '<p>Нет активных маршрутов. Создайте новый!</p>';
      } else {
        let totalRevenue = 0;
        for (const route of game.routes) {
          const rev = route.calculateRevenue();
          totalRevenue += rev;
          html += `
            <div class="item">
              <span class="label">${route.from.city} → ${route.to.city}</span>
              <span class="value">${route.price}$ | загрузка ${Math.round(route.loadFactor * 100)}%</span>
            </div>
          `;
        }
        html += `<div class="item" style="background:#2a6f9c; margin-top:8px;">
          <span class="label">💰 Общий доход за день</span>
          <span class="value">${Math.round(totalRevenue).toLocaleString()} $</span>
        </div>`;
      }
      panel.innerHTML = html;
    }

    function renderAddRouteForm(game, panel) {
      let html = `
        <h3>➕ Новый маршрут</h3>
        <div class="route-form">
          <label>Откуда</label>
          <select id="route-from">
            ${game.airports.map(a => `<option value="${a.id}">${a.city} (${a.name})</option>`).join('')}
          </select>
          <label>Куда</label>
          <select id="route-to">
            ${game.airports.map(a => `<option value="${a.id}">${a.city} (${a.name})</option>`).join('')}
          </select>
          <label>Самолёт</label>
          <select id="route-aircraft">
            ${game.airline.fleet.map(a => `<option value="${a.id}">${a.model} (${a.capacity} мест)</option>`).join('')}
          </select>
          <label>Цена билета ($)</label>
          <input type="number" id="route-price" value="300" min="50" step="10">
          <button id="btn-add-route">✈️ Открыть маршрут</button>
        </div>
      `;
      panel.innerHTML = html;

      // Обработчик кнопки
      document.getElementById('btn-add-route').addEventListener('click', () => {
        const fromId = document.getElementById('route-from').value;
        const toId = document.getElementById('route-to').value;
        const aircraftId = document.getElementById('route-aircraft').value;
        const price = parseInt(document.getElementById('route-price').value);
        if (!price || price < 10) {
          alert('Введите корректную цену');
          return;
        }
        const success = game.addRoute(fromId, toId, aircraftId, price);
        if (success) {
          updateUI(game);
          // Переключаемся на маршруты
          document.querySelector('[data-view="routes"]').click();
        }
      });
    }

    function renderMarket(game, panel) {
      let html = `
        <h3>📊 Рынок самолётов</h3>
        <p>Выберите модель для покупки:</p>
      `;
      for (const ac of game.availableAircrafts) {
        const inFleet = game.airline.fleet.some(a => a.id === ac.id);
        html += `
          <div class="item" style="flex-wrap: wrap;">
            <span class="label">${ac.model} (${ac.capacity} мест)</span>
            <span class="value">${ac.price.toLocaleString()} $</span>
            ${inFleet ? '<span style="color:#8fcbff;">✔️ уже есть</span>' :
              `<button class="buy-btn" data-id="${ac.id}" style="background:#2a6f9c;border:none;color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;">Купить</button>`}
          </div>
        `;
      }
      panel.innerHTML = html;

      // Обработчики кнопок покупки
      document.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.dataset.id;
          game.buyAircraft(id);
          // Обновить рынок (перерисовать)
          renderPanel(game, 'market');
        });
      });
    }

    // ------------------------------------------------------------
    // 6. ОБРАБОТЧИКИ СОБЫТИЙ UI
    // ------------------------------------------------------------
    function setupUI(game) {
      // Переключение вкладок
      document.querySelectorAll('[data-view]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderPanel(game, btn.dataset.view);
        });
      });

      // Инициализация первой вкладки
      document.querySelector('[data-view="fleet"]').classList.add('active');
      renderPanel(game, 'fleet');
    }

    // ------------------------------------------------------------
    // 7. ЗАПУСК ИГРЫ
    // ------------------------------------------------------------
    // Создаём экземпляр игры
    const game = new Game();

    // Инициализируем карту
    const map = initMap('map-container');
    game.map = map;

    // Добавляем маркеры аэропортов
    for (const airport of game.airports) {
      const marker = L.marker([airport.lat, airport.lng])
        .bindPopup(`<b>${airport.name}</b><br>${airport.city}, ${airport.country}`);
      marker.addTo(map);
      game.markers.push(marker);
    }

    // Рисуем начальные маршруты на карте
    game.updateMapRoutes();

    // Настраиваем UI
    setupUI(game);

    // Первый рендер
    updateUI(game);

    // Игровой цикл (каждые 3 секунды)
