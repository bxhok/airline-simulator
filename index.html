<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Симулятор Авиакомпании</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        /* Задаем размер карты на весь экран */
        #map { height: 100vh; width: 100%; }
        
        /* Простенькая панель интерфейса поверх карты */
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 1000; /* Чтобы панель была над картой */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h3>Моя Авиакомпания</h3>
        <p>Деньги: <b>$100,000</b></p>
        <p>Самолетов: <b>1</b></p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // 1. Создаем карту и центрируем ее (например, над Европой)
        var map = L.map('map').setView([50.0, 15.0], 4);

        // 2. Добавляем бесплатный визуальный слой карты от OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. Создаем наш первый аэропорт (координаты Франкфурта)
        var airport = L.marker([50.0333, 8.5705]).addTo(map);
        airport.bindPopup("<b>Аэропорт EDDF</b><br>Ваш первый хаб.").openPopup();
    </script>
</body>
</html>
